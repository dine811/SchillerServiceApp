version: '3.8'

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: schiller-db
    environment:
      POSTGRES_DB: schillerdb
      POSTGRES_USER: schiller
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U schiller -d schillerdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build: ./schiller-backend
    container_name: schiller-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/schillerdb
      SPRING_DATASOURCE_USERNAME: schiller
      SPRING_DATASOURCE_PASSWORD: yourpassword
      JWT_SECRET: schiller-secret-key-change-in-production-min-32-chars
      MAIL_USER: your@email.com
      MAIL_PASS: yourpassword
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
  # ── Next.js Frontend (add once created) ─────────────────────
  # frontend:
  #   build: ./schiller-frontend
  #   container_name: schiller-ui
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8090
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
